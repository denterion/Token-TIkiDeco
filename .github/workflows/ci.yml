name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Foundry fuzz and invariant tests
        run: |
          echo "Foundry deterministic seed: 0x54494b494445434f5f56325f46555a5a5f534545445f3030303030303031"
          npm run foundry:test

      - name: Deployment manifest check
        run: npm run manifest:check

      - name: Bytecode size check
        run: npm run bytecode:size

      - name: Print tokenomics
        run: npm run tokenomics
