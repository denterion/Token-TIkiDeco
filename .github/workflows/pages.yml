name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "site-v2/**"
      - "config/public-versions.json"
      - "config/release-evidence.json"
      - "deployments/canonical.json"
      - "package.json"
      - "package-lock.json"
      - "scripts/build-site-manifest.cjs"
      - "scripts/build-site-pages.cjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: "22.13.1"

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        # Action version: actions/checkout@v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Configure Pages
        # Action version: actions/configure-pages@v5
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Setup Node.js
        # Action version: actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run site:build

      - name: Upload site
        # Action version: actions/upload-pages-artifact@v3
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # Action version: actions/deploy-pages@v5.0.0
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
