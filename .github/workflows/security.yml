name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "22.13.1"
  PYTHON_VERSION: "3.12.8"
  SOLC_VERSION: "0.8.28"
  SOLC_STATIC_LINUX_SHA256: "9a0fb7e0db2c0641dbae1c5cc645dc686820c83af516226abb1c0a2f76636f25"
  SLITHER_VERSION: "0.11.3"
  FOUNDRY_VERSION: "v1.4.0"
  FOUNDRY_FUZZ_SEED: "0x54494b494445434f5f56325f46555a5a5f534545445f3030303030303031"

jobs:
  hardhat-security:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        # Action version: actions/checkout@v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        # Action version: actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare artifact directories
        run: mkdir -p security-artifacts/test security-artifacts/coverage security-artifacts/gas

      - name: Compile
        run: npm run compile

      - name: Tests
        run: npm test 2>&1 | tee security-artifacts/test/hardhat-test.txt

      - name: Setup Foundry
        # Action version: foundry-rs/foundry-toolchain@v1
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Foundry fuzz and invariant tests
        run: |
          echo "Foundry deterministic seed: $FOUNDRY_FUZZ_SEED"
          npm run foundry:test 2>&1 | tee security-artifacts/test/foundry-test.txt

      - name: Foundry V2 branch and function coverage thresholds
        run: npm run foundry:coverage 2>&1 | tee security-artifacts/coverage/foundry-coverage.txt

      - name: Hardhat coverage
        run: npm run coverage

      - name: Copy coverage artifacts
        run: |
          cp -R coverage security-artifacts/coverage/hardhat
          cp lcov.info security-artifacts/coverage/foundry.lcov.info

      - name: Deployment manifest check
        run: npm run manifest:check

      - name: Deployment manifest source config check
        run: npm run manifest:source

      - name: Bytecode size check
        run: npm run bytecode:size 2>&1 | tee security-artifacts/test/bytecode-size.txt

      - name: Gas snapshot
        run: npm run gas:snapshot 2>&1 | tee security-artifacts/gas/gas-snapshot.txt

      - name: npm audit
        run: npm run audit

      - name: Export ABI and bytecode artifacts
        run: npm run artifacts:contracts

      - name: Generate SPDX SBOM
        run: npm run sbom:spdx

      - name: Generate release artifact checksums
        run: npm run checksums

      - name: Upload test, coverage, gas, ABI, bytecode, SBOM, and checksum artifacts
        if: always()
        # Action version: actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hardhat-security-artifacts
          path: security-artifacts/**
          if-no-files-found: warn

  slither:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        # Action version: actions/checkout@v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        # Action version: actions/setup-python@v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        # Action version: actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Foundry for Slither compilation
        # Action version: foundry-rs/foundry-toolchain@v1
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install pinned Slither
        run: |
          pipx install slither-analyzer==${{ env.SLITHER_VERSION }}
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install pinned solc
        run: |
          curl -fsSL "https://github.com/argotorg/solidity/releases/download/v${SOLC_VERSION}/solc-static-linux" -o /tmp/solc
          echo "${SOLC_STATIC_LINUX_SHA256}  /tmp/solc" | sha256sum -c -
          chmod +x /tmp/solc
          sudo mv /tmp/solc /usr/local/bin/solc
          solc --version

      - name: Run Slither JSON scan
        run: |
          mkdir -p security-artifacts/slither
          slither contracts --config-file slither.config.json --solc-remaps @openzeppelin/=node_modules/@openzeppelin/ --json security-artifacts/slither/slither.json || true

      - name: Legacy V1 informational scan and blocking V2 baseline check
        run: npm run slither:baseline

      - name: Generate Slither checksums
        run: npm run checksums

      - name: Upload Slither artifacts
        if: always()
        # Action version: actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: slither-artifacts
          path: security-artifacts/slither/**
          if-no-files-found: warn

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        # Action version: actions/checkout@v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Initialize CodeQL
        # Action version: github/codeql-action/init@v4
        uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        # Action version: github/codeql-action/analyze@v4
        uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout full history
        # Action version: actions/checkout@v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Gitleaks full-history scan
        # Action version: gitleaks/gitleaks-action@v2
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

  clean-room-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        # Action version: actions/checkout@v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Clean-room Docker build
        run: docker build -f .devcontainer/Dockerfile .

  security-gate:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - hardhat-security
      - slither
      - codeql
      - secret-scan
      - clean-room-docker
    if: always()

    steps:
      - name: Require all security jobs to pass
        run: |
          if [ "${{ needs.hardhat-security.result }}" != "success" ]; then
            echo "hardhat-security failed: ${{ needs.hardhat-security.result }}"
            exit 1
          fi
          if [ "${{ needs.slither.result }}" != "success" ]; then
            echo "slither failed: ${{ needs.slither.result }}"
            exit 1
          fi
          if [ "${{ needs.codeql.result }}" != "success" ]; then
            echo "codeql failed: ${{ needs.codeql.result }}"
            exit 1
          fi
          if [ "${{ needs.secret-scan.result }}" != "success" ]; then
            echo "secret-scan failed: ${{ needs.secret-scan.result }}"
            exit 1
          fi
          if [ "${{ needs.clean-room-docker.result }}" != "success" ]; then
            echo "clean-room-docker failed: ${{ needs.clean-room-docker.result }}"
            exit 1
          fi
          echo "All security jobs passed."
