name: Documentation issue
description: Report unclear, stale, or inconsistent public documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Use this for documentation problems only. Do not post private keys, secrets, or vulnerability details.
  - type: input
    id: location
    attributes:
      label: Document or page
      description: Link or path to the documentation that needs attention.
      placeholder: docs/PROJECT_FACTS.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear or incorrect?
      description: Include the exact sentence when possible.
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested correction
      description: Keep wording consistent with the claims matrix and no-sale/no-value boundaries.
  - type: checkboxes
    id: boundaries
    attributes:
      label: Public communication boundaries
      options:
        - label: This issue does not request investment, sale, presale, staking, yield, APY, exchange listing, or price language.
          required: true
        - label: This issue does not claim TikiDeco is independently audited or mainnet-ready.
          required: true
