name: Documentation issue
description: Report a documentation gap, stale fact, or unclear wording.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        TikiDeco / TIDE is a Sepolia prototype only. TIDE is not offered for sale, has no stated monetary value, is not deployed on mainnet, has no active guest benefits, and has not started an independent audit.

        Do not submit private keys, seed phrases, passwords, private guest data, sensitive personal data, or non-public vulnerability details.
  - type: input
    id: file
    attributes:
      label: File or page
      placeholder: docs/PROJECT_FACTS.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Documentation issue
      description: What is stale, missing, unclear, or risky?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested change
      description: Optional wording or structure suggestion.
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary confirmation
      options:
        - label: This suggestion preserves the no-sale, no-value, no-mainnet, no-active-benefit, and independent-audit-not-started boundaries.
          required: true
