name: Utility pilot feedback
description: Feedback on the planned Sepolia-only utility pilot flow.
title: "[Utility pilot]: "
labels:
  - utility-pilot
  - community-preview
body:
  - type: markdown
    attributes:
      value: |
        TikiDeco / TIDE is a Sepolia prototype only. TIDE is not offered for sale, has no stated monetary value, is not deployed on mainnet, has no active guest benefits, and has not started an independent audit.

        The pilot campaign is draft-not-live. Do not submit wallet addresses, private keys, seed phrases, passwords, names, emails, booking data, private guest data, sensitive personal data, screenshots containing those items, or non-public vulnerability details.
  - type: textarea
    id: feedback
    attributes:
      label: Pilot feedback
      description: What is unclear about eligibility, read-only balance checks, snapshots, reports, boundaries, or manual review?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Feedback category
      options:
        - Bug report
        - UX feedback
        - Translation feedback
        - Utility feedback
        - Other
    validations:
      required: true
  - type: dropdown
    id: understands_sepolia
    attributes:
      label: Do you understand that this preview is Ethereum Sepolia only?
      options: ["Yes", "No", "Unclear"]
    validations:
      required: true
  - type: dropdown
    id: understands_no_sale
    attributes:
      label: Do you understand that no token sale exists?
      options: ["Yes", "No", "Unclear"]
    validations:
      required: true
  - type: dropdown
    id: understands_no_mainnet
    attributes:
      label: Do you understand that no mainnet deployment exists?
      options: ["Yes", "No", "Unclear"]
    validations:
      required: true
  - type: dropdown
    id: understands_no_benefit
    attributes:
      label: Do you understand that no active hotel benefit exists?
      options: ["Yes", "No", "Unclear"]
    validations:
      required: true
  - type: dropdown
    id: understands_audit
    attributes:
      label: Do you understand that independent audit has not started?
      options: ["Yes", "No", "Unclear"]
    validations:
      required: true
  - type: dropdown
    id: understands_v2
    attributes:
      label: Do you understand that V2 remains candidate code only?
      options: ["Yes", "No", "Unclear"]
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary confirmation
      options:
        - label: This feedback treats the pilot as draft-not-live and does not claim active guest benefits.
          required: true
        - label: This feedback does not request wallet transaction signing, token approval, transfer, fee collection, or booking confirmation.
          required: true
