name: Security report redirect
description: Do not post sensitive security details publicly.
title: "[Security question - no sensitive details]: "
labels:
  - security-question
body:
  - type: markdown
    attributes:
      value: |
        TikiDeco / TIDE is a Sepolia prototype only. TIDE is not offered for sale, has no stated monetary value, is not deployed on mainnet, has no active guest benefits, and has not started an independent audit.

        Do not submit private keys, seed phrases, passwords, private guest data, sensitive personal data, exploit details, or non-public vulnerability information in this issue.

        For suspected vulnerabilities, follow SECURITY.md:
        https://github.com/denterion/Token-TIkiDeco/blob/main/SECURITY.md
  - type: textarea
    id: public_question
    attributes:
      label: Public security question
      description: Share only high-level, non-sensitive context suitable for a public issue.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Safety confirmation
      options:
        - label: I have not included exploit steps, private keys, seed phrases, passwords, private guest data, sensitive personal data, or non-public vulnerability details.
          required: true
