name: Bug report
description: Report a non-security bug in the Sepolia prototype.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        TikiDeco / TIDE is a Sepolia prototype only. TIDE is not offered for sale, has no stated monetary value, is not deployed on mainnet, has no active guest benefits, and has not started an independent audit.

        Do not submit private keys, seed phrases, passwords, private guest data, sensitive personal data, or non-public vulnerability details. For security reports, use SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide deterministic steps, commands, links, screenshots, or affected files.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Contracts
        - Deployment scripts
        - Tests
        - Public site
        - Documentation
        - CI or release tooling
        - Other
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit SHA or page URL
      description: If known, provide the commit, page, or release where the issue was observed.
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary confirmation
      options:
        - label: This report does not request sale, price, mainnet, transaction signing, active benefit, or independent-audit claims.
          required: true
        - label: This report does not include private keys, seed phrases, passwords, private guest data, or sensitive personal data.
          required: true
